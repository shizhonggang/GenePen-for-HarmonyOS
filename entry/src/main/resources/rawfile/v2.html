<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 GenePen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e0e2ed;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:0 16px;height:42px;background:#1a1d28;border-bottom:1px solid #2e3344;display:flex;align-items:center;gap:0;flex-shrink:0}
header h1{font-size:17px;white-space:nowrap;margin-right:4px}header .sub{color:#8b8fa8;font-size:13px;margin-right:12px}
.menu-item{position:relative;padding:7px 12px;background:transparent;color:#b0b4c8;border:none;cursor:pointer;font-size:14px;border-radius:4px;transition:background .1s}
.menu-item:hover,.menu-item.open{background:#2a2f3e;color:#e0e2ed}
.dropdown{display:none;position:absolute;top:100%;left:0;margin-top:2px;background:#1e2230;border:1px solid #2e3344;border-radius:6px;padding:4px 0;min-width:140px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.menu-item.open .dropdown{display:block}
.dropdown .drop-item{display:block;width:100%;padding:8px 16px;background:transparent;border:none;color:#b0b4c8;font-size:14px;text-align:left;cursor:pointer;white-space:nowrap}
.dropdown .drop-item:hover{background:#2a2f3e;color:#e0e2ed}
.dropdown .drop-item.disabled{color:#4a4f60;cursor:default;pointer-events:none}
.dropdown .drop-item.checked::before{content:'✓ ';color:#4f8cff}
.dropdown .drop-sep{height:1px;margin:4px 10px;background:#2e3344}
.drop-item.has-sub{position:relative}
.drop-item.has-sub::after{content:'▸';position:absolute;right:10px;color:#5a5f78}
.submenu{display:none;position:absolute;left:100%;top:-4px;background:#1e2230;border:1px solid #2e3344;border-radius:6px;padding:4px 0;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.drop-item.has-sub:hover>.submenu{display:block}
#fileInput{display:none}
#status{margin-left:auto;color:#6b7088;font-size:13px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabbar{display:flex;background:#1a1d28;border-top:1px solid #2e3344;flex-shrink:0}
.tabbar button{padding:10px 22px;background:transparent;color:#8b8fa8;border:none;cursor:pointer;font-size:16px;border-top:2px solid transparent;transition:all.15s}
.tabbar button:hover{color:#e0e2ed;background:rgba(79,140,255,.06)}
.tabbar button.active{color:#4f8cff;border-top-color:#4f8cff}
.tabc{display:none;flex:1;overflow:hidden;flex-direction:column}
.tabc.active{display:flex}
#canvasWrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:#0e1018;overflow:hidden}
#c{max-width:100%;max-height:100%}
#placeholder{color:#8b8fa8;font-size:17px;text-align:center;position:absolute}
#bottom{display:flex;align-items:center;gap:12px;padding:5px 16px;background:#1a1d28;border-top:1px solid #2e3344;flex-shrink:0;font-size:14px;color:#8b8fa8}
.map-bar{display:flex;align-items:center;gap:10px;padding:6px 12px;background:#1a1d28;border-top:1px solid #2e3344;flex-shrink:0;font-size:14px}
.map-bar label{color:#8b8fa8;display:flex;align-items:center;gap:3px;white-space:nowrap}
.map-bar select,.map-bar input[type=checkbox]{background:#1a1d28;color:#e0e2ed;border:1px solid #2e3344;border-radius:3px;padding:1px 3px}
/* Seq viewer */
#seqViewWrap{flex:1;overflow:hidden;position:relative;background:#0e1018}
#seqView{display:block;cursor:grab}
#seqView:active{cursor:grabbing}
.seq-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#232734;border-top:1px solid #2e3344;flex-shrink:0;font-size:14px}
.seq-bar label{color:#8b8fa8;display:flex;align-items:center;gap:3px;white-space:nowrap}
.seq-bar select,.seq-bar input[type=checkbox]{background:#1a1d28;color:#e0e2ed;border:1px solid #2e3344;border-radius:3px;padding:1px 3px}
.seq-bar input[type=range]{width:90px;height:4px;accent-color:#4f8cff;cursor:pointer}
.zoom-label{color:#8b8fa8;font-size:12px;min-width:50px;text-align:center}
/* Enzyme table */
#enzPanel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.enz-bar{display:flex;align-items:center;gap:10px;padding:6px 10px;background:#232734;border-top:1px solid #2e3344;flex-shrink:0;font-size:14px}
.enz-bar select{background:#1a1d28;color:#e0e2ed;border:1px solid #2e3344;border-radius:3px;padding:1px 3px}
#enzTable{width:100%;border-collapse:collapse;font-size:14px;overflow-y:auto;display:block;flex:1}
#enzTable thead{position:sticky;top:0;z-index:1}
#enzTable th{background:#1a1d28;color:#8b8fa8;text-align:left;padding:5px 8px;border-bottom:1px solid #2e3344;font-weight:500}
#enzTable td{padding:4px 8px;border-bottom:1px solid rgba(46,51,68,.4);font-family:monospace;font-size:13px}
#enzBody tr:hover td{background:rgba(79,140,255,.08)}
#enzEmpty{padding:20px;text-align:center;color:#8b8fa8}
/* Properties panel */
#propPanel{position:fixed;right:0;top:42px;bottom:0;width:260px;background:#1a1d28;border-left:1px solid #2e3344;z-index:50;display:flex;flex-direction:column;transition:transform .2s;overflow-y:auto}
#propPanel.hidden{transform:translateX(100%)}
#propToggle{position:fixed;right:260px;top:50%;transform:translateY(-50%);background:#1a1d28;border:1px solid #2e3344;border-right:none;border-radius:4px 0 0 4px;padding:8px 5px;cursor:pointer;z-index:51;color:#8b8fa8;font-size:13px;writing-mode:vertical-rl;transition:right .2s}
#propToggle.hidden{right:0}
.prop-section{padding:10px 12px;border-bottom:1px solid #2e3344}
.prop-title{font-size:13px;color:#8b8fa8;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.prop-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:14px}
.prop-row .pk{color:#6b7088}
.prop-row .pv{color:#e0e2ed;text-align:right;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prop-empty{padding:20px 12px;color:#5a5f78;font-size:13px;text-align:center}
/* Modal dialog */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:#1e2230;border:1px solid #3a4060;border-radius:10px;padding:20px;min-width:320px;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-title{font-size:16px;font-weight:bold;color:#e0e2ed;margin-bottom:12px}
.modal-body{margin-bottom:16px;color:#b0b4c8;font-size:14px}
.modal-body textarea{width:100%;min-height:60px;background:#0f1117;color:#e0e2ed;border:1px solid #2e3344;border-radius:6px;padding:8px;font-family:Consolas,monospace;font-size:14px;resize:vertical}
.modal-body .warn{color:#f0a030;margin-bottom:8px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.modal-actions button{padding:7px 18px;border:none;border-radius:5px;font-size:14px;cursor:pointer}
.modal-actions .btn-cancel{background:#2a2f3e;color:#b0b4c8}
.modal-actions .btn-cancel:hover{background:#3a4050}
.modal-actions .btn-ok{background:#4f8cff;color:#fff}
.modal-actions .btn-ok:hover{background:#3b7ae8}
.modal-actions .btn-danger{background:#e05050;color:#fff}
.modal-actions .btn-danger:hover{background:#c04040}
</style>
</head>
<body>

<header>
  <div class="menu-item" id="menuFile">文件
    <div class="dropdown">
      <label class="drop-item">打开文件…<input type="file" id="fileInput" accept=".gb,.gbk,.genbank,.fasta,.fa,.dna,.txt"></label>
      <button class="drop-item disabled" id="btnRecent">最近打开</button>
      <div class="drop-sep"></div>
      <button class="drop-item" id="btnSave">保存 <span style="color:#5a5f78;float:right">Ctrl+S</span></button>
      <button class="drop-item" id="btnSaveAs">另存为…</button>
      <div class="drop-sep"></div>
      <button class="drop-item" id="btnGb">导出 GenBank (.gb)</button>
      <button class="drop-item" id="btnExFa">导出 FASTA (.fa)</button>
      <button class="drop-item" id="btnExTxt">导出纯序列 (.txt)</button>
      <button class="drop-item" id="btnExDna">导出 SnapGene (.dna)</button>
      <button class="drop-item disabled" id="btnExPng">导出图谱 PNG</button>
      <div class="drop-sep"></div>
      <button class="drop-item disabled" id="btnSeqInfo">序列信息</button>
    </div>
  </div>
  <div class="menu-item" id="menuEnz">酶
    <div class="dropdown">
      <button class="drop-item checked" id="togEnz">显示酶切位点</button>
      <div class="drop-sep"></div>
      <div class="drop-item has-sub">筛选
        <div class="submenu">
          <button class="drop-item checked" data-enzf="unique">Unique (1切点)</button>
          <button class="drop-item checked" data-enzf="dual">Dual (2切点)</button>
          <button class="drop-item" data-enzf="all">全部 (3+切点)</button>
        </div>
      </div>
      <div class="drop-item has-sub disabled">提供商
        <div class="submenu">
          <button class="drop-item checked">全部</button>
          <button class="drop-item">NEB</button>
          <button class="drop-item">Thermo Fisher</button>
        </div>
      </div>
    </div>
  </div>

  <div class="menu-item" id="menuPrimer">引物
    <div class="dropdown">
      <button class="drop-item checked" id="togPrimers">显示引物</button>
      <div class="drop-sep"></div>
      <button class="drop-item" id="btnAddPrimer">添加引物…</button>
      <button class="drop-item disabled">引物设计</button>
    </div>
  </div>
  <div class="menu-item" id="menuFeat">注释
    <div class="dropdown">
      <button class="drop-item checked" id="togFeat">显示特征注释</button>
      <div class="drop-sep"></div>
      <button class="drop-item disabled">添加注释</button>
      <button class="drop-item disabled">编辑注释</button>
    </div>
  </div>
  <div class="menu-item" id="menuORF">ORF
    <div class="dropdown">
      <button class="drop-item checked" id="togORF">显示 ORF</button>
      <div class="drop-sep"></div>
      <div class="drop-item has-sub">阅读框
        <div class="submenu">
          <button class="drop-item checked" data-frame="1">+1</button>
          <button class="drop-item" data-frame="2">+2</button>
          <button class="drop-item" data-frame="3">+3</button>
          <div class="drop-sep"></div>
          <button class="drop-item" data-frame="-1">-1</button>
          <button class="drop-item" data-frame="-2">-2</button>
          <button class="drop-item" data-frame="-3">-3</button>
          <div class="drop-sep"></div>
          <button class="drop-item" data-frame="all">全部</button>
        </div>
      </div>
      <div class="drop-item has-sub">氨基酸
        <div class="submenu">
          <button class="drop-item checked" data-aamode="1">单字母</button>
          <button class="drop-item" data-aamode="3">三字母</button>
        </div>
      </div>
      <div class="drop-item has-sub">最短长度
        <div class="submenu">
          <button class="drop-item" data-minorf="10">≥ 10 aa</button>
          <button class="drop-item" data-minorf="20">≥ 20 aa</button>
          <button class="drop-item checked" data-minorf="30">≥ 30 aa</button>
          <button class="drop-item" data-minorf="50">≥ 50 aa</button>
          <button class="drop-item" data-minorf="100">≥ 100 aa</button>
        </div>
      </div>
    </div>
  </div>
  <select id="frameS" style="display:none"><option value="1">+1</option><option value="2">+2</option><option value="3">+3</option><option value="-1">-1</option><option value="-2">-2</option><option value="-3">-3</option><option value="all">全部</option></select>
  <select id="aaMode" style="display:none"><option value="1">单字母</option><option value="3">三字母</option></select>
  <input type="hidden" id="minORF" value="30">
  <span id="status">就绪</span>
</header>

<div id="main">
  <!-- Map Tab -->
  <div id="tabMap" class="tabc active">
    <div id="canvasWrap"><canvas id="c"></canvas><div id="placeholder">📂 点击「打开文件」加载质粒序列</div></div>
    <div class="map-bar">
      <select id="mapMode"><option value="circular">环形</option><option value="linear">线性</option></select>
      <label><input type="checkbox" id="showEnzOnMap" checked> 酶切位点</label>
      <label><input type="checkbox" id="showPrimers" checked> 引物</label>
      <span style="margin-left:auto;display:flex;align-items:center;gap:4px">
        <span style="color:#8b8fa8;font-size:11px">🔍</span>
        <input type="range" id="mapZoom" min="50" max="5000" value="100" style="width:100px;height:4px;accent-color:#4f8cff;cursor:pointer">
        <span id="mapZoomLbl" style="color:#8b8fa8;font-size:10px;min-width:36px;text-align:center">100%</span>
        <button id="mapZoomReset" style="padding:1px 6px;background:#1a1d28;color:#8b8fa8;border:1px solid #2e3344;border-radius:3px;cursor:pointer;font-size:11px">重置</button>
      </span>
    </div>
  </div>

  <!-- Seq Tab -->
  <div id="tabSeq" class="tabc">
    <div id="seqViewWrap"><canvas id="seqView"></canvas></div>
    <div class="seq-bar">
      <input type="checkbox" id="showORF" checked style="display:none">
      <label><input type="checkbox" id="showFeatInSeq" checked> 特征</label>
      <label><input type="checkbox" id="showEnzInSeq" checked> 酶切</label>
    </div>
  </div>

  <!-- Enzyme Tab -->
  <div id="tabEnz" class="tabc">
    <div id="enzPanel">
      <table id="enzTable"><thead><tr><th>酶</th><th>识别序列</th><th>切点位置</th><th>数量</th></tr></thead>
        <tbody id="enzBody"></tbody>
      </table>
      <div id="enzEmpty">无匹配酶切位点</div>
      <div class="enz-bar">
        <span style="color:#8b8fa8">限制性内切酶</span>
        <span id="enzCnt" style="color:#5a5f78;font-size:13px"></span>
      </div>
    </div>
  </div>

  <!-- Feature Tab -->
  <div id="tabFeat" class="tabc">
    <div id="featPanel" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <table id="featTable" style="width:100%;border-collapse:collapse;font-size:14px;overflow-y:auto;display:block;flex:1">
        <thead style="position:sticky;top:0;z-index:1"><tr>
          <th style="background:#1a1d28;color:#8b8fa8;text-align:left;padding:6px 8px;border-bottom:1px solid #2e3344">类型</th>
          <th style="background:#1a1d28;color:#8b8fa8;text-align:left;padding:6px 8px;border-bottom:1px solid #2e3344">名称</th>
          <th style="background:#1a1d28;color:#8b8fa8;text-align:left;padding:6px 8px;border-bottom:1px solid #2e3344">范围</th>
          <th style="background:#1a1d28;color:#8b8fa8;text-align:left;padding:6px 8px;border-bottom:1px solid #2e3344">长度</th>
          <th style="background:#1a1d28;color:#8b8fa8;text-align:left;padding:6px 8px;border-bottom:1px solid #2e3344">方向</th>
        </tr></thead>
        <tbody id="featBody"></tbody>
      </table>
      <div id="featEmpty" style="padding:20px;text-align:center;color:#8b8fa8">无特征注释</div>
    </div>
  </div>
</div>

<div class="tabbar">
  <button class="active" data-tab="map">图谱</button>
  <button data-tab="seq">序列</button>
  <button data-tab="enz">酶切位点</button>
  <button data-tab="feat">特征</button>
</div>

<div id="bottom">
  <span id="bpInfo">长度：—</span>
  <span id="gcInfo">GC%：—</span>
  <span id="featCnt">特征：—</span>
</div>

<!-- Properties Panel -->
<button id="propToggle" class="hidden" onclick="document.getElementById('propPanel').classList.toggle('hidden');this.classList.toggle('hidden')">属性</button>
<div id="propPanel" class="hidden">
  <div class="prop-section" id="propPlasmid">
    <div class="prop-title">质粒信息</div>
    <div class="prop-row"><span class="pk">名称</span><span class="pv" id="ppName">—</span></div>
    <div class="prop-row"><span class="pk">长度</span><span class="pv" id="ppLen">—</span></div>
    <div class="prop-row"><span class="pk">拓扑</span><span class="pv" id="ppTopo">—</span></div>
    <div class="prop-row"><span class="pk">GC%</span><span class="pv" id="ppGC">—</span></div>
    <div class="prop-row"><span class="pk">特征数</span><span class="pv" id="ppFeat">—</span></div>
  </div>
  <div class="prop-section" id="propSelection">
    <div class="prop-title">选中信息</div>
    <div class="prop-empty" id="propSelEmpty">点击图谱或序列中的元素查看详情</div>
    <div id="propSelContent" style="display:none"></div>
  </div>
</div>

<!-- Context Menu -->
<div id="seqCtxMenu" class="dropdown" style="display:none;position:fixed;z-index:300">
  <button class="drop-item" id="ctxCopy">复制正链 <span style="color:#5a5f78;float:right">Ctrl+C</span></button>
  <button class="drop-item" id="ctxCopyRC">复制负链 <span style="color:#5a5f78;float:right">Ctrl+Shift+C</span></button>
  <div class="drop-sep"></div>
  <button class="drop-item" id="ctxInsert">插入序列…</button>
  <button class="drop-item" id="ctxDelete">删除选区</button>
  <div class="drop-sep"></div>
  <button class="drop-item" id="ctxSelectAll">全选 <span style="color:#5a5f78;float:right">Ctrl+A</span></button>
  <div class="drop-sep"></div>
  <button class="drop-item" id="ctxAddPrimer">添加引物…</button>
  <div class="drop-sep" id="ctxPrimerSep"></div>
  <button class="drop-item" id="ctxEditPrimer">编辑引物…</button>
  <button class="drop-item" id="ctxCopyPrimer">复制引物序列</button>
  <button class="drop-item" id="ctxDelPrimer">删除引物</button>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">取消</button>
      <button class="btn-ok" id="modalOK">确认</button>
    </div>
  </div>
</div>

<script>
// ═══════ Codon & Utils ═══════
const CODON={};['TTT:F','TTC:F','TTA:L','TTG:L','TCT:S','TCC:S','TCA:S','TCG:S','TAT:Y','TAC:Y','TAA:*','TAG:*','TGT:C','TGC:C','TGA:*','TGG:W','CTT:L','CTC:L','CTA:L','CTG:L','CCT:P','CCC:P','CCA:P','CCG:P','CAT:H','CAC:H','CAA:Q','CAG:Q','CGT:R','CGC:R','CGA:R','CGG:R','ATT:I','ATC:I','ATA:I','ATG:M','ACT:T','ACC:T','ACA:T','ACG:T','AAT:N','AAC:N','AAA:K','AAG:K','AGT:S','AGC:S','AGA:R','AGG:R','GTT:V','GTC:V','GTA:V','GTG:V','GCT:A','GCC:A','GCA:A','GCG:A','GAT:D','GAC:D','GAA:E','GAG:E','GGT:G','GGC:G','GGA:G','GGG:G'].forEach(s=>{const[k,v]=s.split(':');CODON[k]=v});
const CODON3={};['TTT:Phe','TTC:Phe','TTA:Leu','TTG:Leu','TCT:Ser','TCC:Ser','TCA:Ser','TCG:Ser','TAT:Tyr','TAC:Tyr','TAA:Ter','TAG:Ter','TGT:Cys','TGC:Cys','TGA:Ter','TGG:Trp','CTT:Leu','CTC:Leu','CTA:Leu','CTG:Leu','CCT:Pro','CCC:Pro','CCA:Pro','CCG:Pro','CAT:His','CAC:His','CAA:Gln','CAG:Gln','CGT:Arg','CGC:Arg','CGA:Arg','CGG:Arg','ATT:Ile','ATC:Ile','ATA:Ile','ATG:Met','ACT:Thr','ACC:Thr','ACA:Thr','ACG:Thr','AAT:Asn','AAC:Asn','AAA:Lys','AAG:Lys','AGT:Ser','AGC:Ser','AGA:Arg','AGG:Arg','GTT:Val','GTC:Val','GTA:Val','GTG:Val','GCT:Ala','GCC:Ala','GCA:Ala','GCG:Ala','GAT:Asp','GAC:Asp','GAA:Glu','GAG:Glu','GGT:Gly','GGC:Gly','GGA:Gly','GGG:Gly'].forEach(s=>{const[k,v]=s.split(':');CODON3[k]=v});
// Find ORFs ≥ minAA in a translated amino acid string. Returns Set of valid AA indices.
function findValidORFs(aaStr,minAA){
  const valid=new Set();
  let orfStart=-1;
  for(let i=0;i<aaStr.length;i++){
    if(aaStr[i]==='M'&&orfStart<0)orfStart=i;
    if(aaStr[i]==='*'&&orfStart>=0){
      if(i-orfStart>=minAA)for(let k=orfStart;k<=i;k++)valid.add(k);
      orfStart=-1;
    }
  }
  // Handle ORF running to end without stop
  if(orfStart>=0&&aaStr.length-orfStart>=minAA)for(let k=orfStart;k<aaStr.length;k++)valid.add(k);
  return valid;
}
const RC={'A':'T','T':'A','C':'G','G':'C','N':'N','R':'Y','Y':'R','S':'S','W':'W','K':'M','M':'K','B':'V','V':'B','D':'H','H':'D'};
function revComp(s){let r='';for(let i=s.length-1;i>=0;i--)r+=RC[s[i]]||s[i];return r}
function translate(seq,f){let s=seq.toUpperCase();if(f>0)s=s.slice(f-1);else{s=revComp(s);s=s.slice(Math.abs(f)-1)}let aa='';for(let i=0;i+3<=s.length;i+=3)aa+=CODON[s.substr(i,3)]||'X';return aa}
function calcTm(seq){
  const s=seq.toUpperCase().replace(/[^ATCG]/g,'');
  if(!s.length)return 0;

function parseGB(text){

    if(/^LOCUS/.test(l)){const m=l.match(/^(LOCUS\s+)(\S+)/);if(m)doc.locus=m[2];doc.circular=/CIRCULAR/i.test(l);i++}

      if(fm){
        if(cf)doc.features.push(cf);
        cf={type:fm[1],start:0,end:0,strand:1,label:'',gene:'',product:'',notes:[]};
        let s=fm[2].trim(),str=1;

        while(s.startsWith('complement(')){str*=-1;s=s.slice(11,-1)}

}

function parseDNA(buf){
  const dv=new DataView(buf);const doc={locus:'',accession:'',definition:'',organism:'',sequence:'',circular:!0,features:[]};
  let off=0;

  if(cookie!==0x09){

    console.warn('DNA cookie 0x'+cookie.toString(16)+', expected 0x09');
  }

      }else if(bt===0x0A&&sz>0){

        console.log('[pangu] Features XML length:',rawXml.length,'chars');
        const xd=new DOMParser().parseFromString(rawXml,'text/xml');
        // Check for parse errors
        const pe=xd.querySelector('parsererror');
        if(pe)console.warn('[pangu] XML parse error:',pe.textContent);
        xd.querySelectorAll('Feature').forEach(fn=>{
          const f={type:fn.getAttribute('type')||'misc',start:0,end:0,strand:1,label:fn.getAttribute('name')||'',gene:'',product:'',notes:[]};
          const dir=fn.getAttribute('directionality')||'0';
          f.strand=dir==='2'?-1:1;
          let mi=Infinity,ma=0;
          // Parse Segment ranges (handle "start-end", "start..end", "start end")
          let segColor='';
          fn.querySelectorAll('Segment').forEach(seg=>{
            const r=seg.getAttribute('range')||'';
            const p=r.split(/[-.\s]+/).map(Number).filter(n=>!isNaN(n));
            if(p.length>=2){if(p[0]<mi)mi=p[0];if(p[p.length-1]>ma)ma=p[p.length-1]}
            if(!segColor&&seg.getAttribute('color'))segColor=seg.getAttribute('color');
          });

          if(mi!==Infinity&&mi>0){f.start=mi-1;f.end=ma}
          else console.warn('[pangu] Feature "'+f.label+'" has no valid range');
          // Parse qualifiers
          fn.querySelectorAll('Q').forEach(q=>{
            const n=q.getAttribute('name'),vn=q.querySelector('V');
            if(n&&vn){const t=vn.getAttribute('text')||vn.getAttribute('predef')||vn.getAttribute('int')||vn.textContent||'';
              if(n==='label')f.label=t;if(n==='gene')f.gene=t;if(n==='product')f.product=t;if(n==='note')f.notes.push(t)}
          });

function detectAndParse(t,bin){

// ═══════ Track Assignment (avoid feature overlap) ═══════
function assignTracks(features, len) {
  const items = features.filter(f => f.type !== 'source' && f.start != null && f.end != null)
    .map(f => ({ f, s: f.start, e: f.end })).sort((a, b) => a.s - b.s);
  const ends = []; // end position of last feature per track
  const map = new Map();
  for (const it of items) {
    let placed = false;
    for (let t = 0; t < ends.length; t++) {
      if (it.s >= ends[t]) { ends[t] = it.e; map.set(it.f, t); placed = true; break; }
    }
    if (!placed) { map.set(it.f, ends.length); ends.push(it.e); }
  }
  return { map, count: ends.length };
}

function serializeGB(doc){
  let g='LOCUS       '+(doc.locus||'unnamed').padEnd(16)+' '
    +doc.sequence.length+' bp    DNA     '
    +(doc.circular?'circular':'linear')+' SYN\n';
  g+='DEFINITION  '+(doc.definition||'')+'.\n';
  g+='ACCESSION   '+(doc.accession||'unknown')+'\n';
  g+='FEATURES             Location/Qualifiers\n';
  for(const f of doc.features){
    if(f.type==='source')continue;
    const loc=(f.strand===-1?'complement(':'')+(f.start+1)+'..'+f.end+(f.strand===-1?')':'');
    g+='     '+f.type.padEnd(16)+loc+'\n';
    if(f.label)g+='                     /label="'+f.label+'"\n';
    if(f.gene)g+='                     /gene="'+f.gene+'"\n';
    if(f.product)g+='                     /product="'+f.product+'"\n';
  }
  g+='ORIGIN\n';
  for(let i=0;i<doc.sequence.length;i+=60){
    const ch=doc.sequence.slice(i,i+60).toLowerCase();
    let l=String(i+1).padStart(9,' ');
    for(let j=0;j<ch.length;j+=10)l+=' '+ch.slice(j,j+10);
    g+=l+'\n';
  }
  g+='//\n';
  return g;
}

  u8.set(notesBytes,off);off+=notesBytes.length;
  // Features packet: type 0x0A (only if features exist)
  if(features.length){
    dv.setUint8(off++,0x0A);
    dv.setUint32(off,featBytes.length,false);off+=4;
    u8.set(featBytes,off);off+=featBytes.length;
  }
  // Primers packet: type 0x05 (only if primers exist)
  if(primers.length){
    dv.setUint8(off++,0x05);
    dv.setUint32(off,primerBytes.length,false);off+=4;
    u8.set(primerBytes,off);off+=primerBytes.length;
  }
  return buf;
}

// ═══════ Bridge (I/O Abstraction) ═══════
// → future module: src/bridge.js
// HAP adaptation: replace this section's internals to call native APIs
const Bridge={
  _isHAP:typeof window.ohosWebView!=='undefined',

  // Read a file from user selection. Returns {name, doc} or null.
  async openFile(){
    if(this._isHAP){
      // HAP: call native file picker via bridge
      const result=await window.ohosWebView.callNative('openFile');
      if(!result)return null;
      const p=result.isBinary
        ?detectAndParse(result.data,true)
        :detectAndParse(result.data,false);
      return p&&p.sequence&&p.sequence.length>=5?{name:result.name,doc:p}:null;
    }
    // Browser: use hidden <input type="file">
    return new Promise(resolve=>{
      const fi=document.getElementById('fileInput');
      const handler=async e=>{
        fi.removeEventListener('change',handler);
        const file=e.target.files[0];if(!file){resolve(null);return}
        try{
          const isBin=/\.dna$/i.test(file.name);
          const data=isBin?await file.arrayBuffer():await file.text();
          const p=detectAndParse(data,isBin);
          resolve(p&&p.sequence&&p.sequence.length>=5?{name:file.name,doc:p}:null);
        }catch(err){console.error(err);resolve(null)}
      };
      fi.addEventListener('change',handler);
      fi.value='';fi.click();
    });
  },

  // Export file to user. content=string, mime=MIME type.
  exportFile(name,content,mime){
    if(this._isHAP){
      window.ohosWebView.callNative('saveFile',{name,content,mime});
      return;
    }
    const b=new Blob([content],{type:mime||'text/plain'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);a.download=name;a.click();
    URL.revokeObjectURL(a.href);
  }
};

  document.getElementById('btnSaveAs').addEventListener('click',async()=>{
    if(!doc)return;
    const ok=await seqView._showModal('另存为','<label style="display:flex;align-items:center;gap:8px;color:#b0b4c8">格式 <select id="saveFormatSel" style="background:#1a1d28;color:#e0e2ed;border:1px solid #2e3344;border-radius:4px;padding:4px 8px;font-size:12px"><option value="gb">GenBank (.gb)</option><option value="fa">FASTA (.fa)</option><option value="dna">SnapGene (.dna)</option><option value="txt">纯序列 (.txt)</option></select></label>',{okText:'保存'});
    if(!ok)return;
    const fmt=document.getElementById('saveFormatSel').value;
    saveAs(fmt);
  });
  // Global keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveAs(lastSaveFormat)}
    // Feature-level undo/redo (primers, annotations) — only if SeqViewer didn't handle it
    if(!e.defaultPrevented&&(e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey&&featUndo.length){e.preventDefault();undoFeat()}
    if(!e.defaultPrevented&&(e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))&&featRedo.length){e.preventDefault();redoFeat()}
  });
})();
</script>
</body>
</html>
